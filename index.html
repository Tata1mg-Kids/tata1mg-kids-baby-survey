<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Parent Pulse - Kids & Baby Care</title>
  <style>
    :root{--bg:#eaf8f4;--card:#ffffff;--ink:#17342f;--muted:#5c746e;--teal:#087a6d;--teal2:#0ba895;--yellow:#ffd35a;--line:#d5ebe5;--danger:#b42318;--shadow:0 20px 60px rgba(8,122,109,.16)}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top left,#fff7d6 0,#eaf8f4 32%,#eef8ff 100%);color:var(--ink);min-height:100vh}.wrap{width:min(900px,94vw);margin:0 auto;padding:28px 0 44px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.brand{font-weight:800;letter-spacing:-.02em}.pill{background:#fff7d6;border:1px solid #f4dc87;border-radius:999px;padding:8px 13px;font-size:13px;color:#6d5300}.card{background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:28px;padding:32px}.hero{text-align:center;padding:48px 28px}.icon{font-size:54px;margin-bottom:12px}.eyebrow{text-transform:uppercase;letter-spacing:.12em;font-size:12px;color:var(--teal);font-weight:800}.title{font-size:clamp(34px,6vw,62px);line-height:1.02;margin:10px auto 14px;letter-spacing:-.055em;max-width:780px}.sub{font-size:19px;color:var(--muted);max-width:680px;margin:0 auto 24px;line-height:1.55}.btn{border:0;background:var(--teal);color:#fff;padding:15px 22px;border-radius:16px;font-weight:800;font-size:16px;cursor:pointer;box-shadow:0 10px 22px rgba(8,122,109,.22)}.btn:hover{background:#06685d}.btn.secondary{background:#eff8f6;color:var(--teal);box-shadow:none;border:1px solid var(--line)}.btn:disabled{opacity:.5;cursor:not-allowed}.progress{height:10px;background:#d8eee9;border-radius:999px;overflow:hidden;margin:14px 0 22px}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--teal2),var(--yellow));transition:.25s}.qnum{display:inline-flex;align-items:center;gap:8px;color:var(--teal);font-weight:800;font-size:13px;margin-bottom:10px}.qnum:before{content:'🌱'}.question{font-size:30px;line-height:1.18;margin:0 0 20px;letter-spacing:-.03em}.hint{color:var(--muted);margin:-8px 0 18px}.options{display:grid;gap:12px}.opt{display:flex;gap:12px;align-items:flex-start;border:1.5px solid var(--line);background:#fff;border-radius:18px;padding:15px 16px;cursor:pointer;transition:.15s}.opt:hover{border-color:var(--teal2);transform:translateY(-1px)}.opt input{margin-top:3px;accent-color:var(--teal)}.opt.selected{border-color:var(--teal);background:#effaf7}.field{width:100%;border:1.5px solid var(--line);border-radius:16px;padding:14px 15px;font-size:16px;color:var(--ink);outline:none;background:#fff}.field:focus{border-color:var(--teal)}textarea.field{min-height:110px;resize:vertical}.nav{display:flex;justify-content:space-between;gap:12px;margin-top:24px}.error{color:var(--danger);font-weight:700;margin-top:14px}.scale{display:grid;grid-template-columns:repeat(11,1fr);gap:8px}.scale button{border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px 0;font-weight:800;cursor:pointer}.scale button.selected{background:var(--teal);color:#fff;border-color:var(--teal)}.tiny{font-size:13px;color:var(--muted);line-height:1.4}.done{text-align:center;padding:44px 20px}.done h1{font-size:42px;margin:10px 0}.hidden{display:none!important}@media(max-width:640px){.card{padding:22px;border-radius:22px}.hero{padding:38px 18px}.question{font-size:24px}.scale{grid-template-columns:repeat(6,1fr)}.nav{flex-direction:column-reverse}.btn{width:100%}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top"><div class="brand">Tata 1mg Kids & Baby</div><div class="pill">Anonymous • 2 min • Mostly one-tap</div></div>
    <main id="app" class="card hero">
      <div class="icon">👶✨</div>
      <div class="eyebrow">The Parent Pulse</div>
      <h1 class="title">Kids & Baby Care</h1>
      <p class="sub">No two kids, or parents, are the same. Tell us what your last year has actually looked like — takes about 2 minutes.</p>
      <button class="btn" onclick="startSurvey()">Let’s go</button>
    </main>
  </div>
<script>
const SUBMIT_URL = ""; // Paste your Google Apps Script Web App URL here to collect responses in Google Sheets.
const state = { step:0, answers:{}, q2Options:[], q3Skipped:false };
const q2 = {
  early:["Feeding or formula struggles","Diaper rash / skin issues","Keeping up with vaccinations","One illness after another","Sleep — theirs, and therefore mine","Whether growth/development is on track","Finding a pediatrician I actually trust","Getting medicine dosing right","Honestly, none of this — smooth sailing"],
  growing:["Getting them to eat anything at all","Skin or diaper issues","Keeping up with vaccinations","One illness after another","Sleep struggles","Whether growth/development is on track","Finding a pediatrician I actually trust","Getting medicine dosing right","Tantrums / behaviour","Honestly, none of this — smooth sailing"],
  school:["Getting them to eat anything nutritious","One illness after another","Sleep struggles","Finding a doctor I actually trust","Getting medicine dosing right","Behaviour, screen time, attitude","Their mood / mental health","Honestly, none of this — smooth sailing"]
};
const questions = [
 {id:'child_stage', type:'single', title:'Tell us about your little one', options:['On the way, expecting','Newborn, 0–3 months','Infant, 3–12 months','Toddler, 1–3 years','Preschooler, 3–5 years','School-age, 5–12 years','Teen, 12+ years']},
 {id:'kept_up', type:'multi', title:"In the last year, what has genuinely kept you up at night — literally or figuratively?", options:()=>state.q2Options},
 {id:'magic_wand', type:'single', title:'If you could wave a magic wand and fix just one of these tonight, which would it be?', options:()=> (state.answers.kept_up||[]).filter(x=>!x.includes('smooth sailing'))},
 {id:'headspace', type:'single', title:'How much headspace does this actually take up in a typical week?', options:['Barely a thought','A background worry I check in on','A recurring stressor I actively manage','It’s consuming — I think about it daily']},
 {id:'walked_away', type:'single', title:'Have you ever gone to buy something for your child on Tata 1mg and walked away without buying?', options:['No, I buy from 1mg regularly, no issues','Never actually tried buying kids/baby products on 1mg','Yes — it was out of stock','Yes — couldn’t find what I needed','Yes — found it cheaper somewhere else','Yes — some other reason']},
 {id:'go_to', type:'multi', title:"Who’s your go-to when something feels off with your child?", options:['Google / YouTube rabbit hole','Their pediatrician','A health app','Instagram / social media','A parenting group or community, like WhatsApp or Reddit','My mother, mother-in-law, or a friend who’s been through it','I mostly figure it out myself']},
 {id:'trust_place', type:'single', title:"If you had to name one place you trust most for your child’s health needs, where would that be?", options:['Tata 1mg','Amazon','FirstCry','Blinkit / Zepto / Instamart','My local pharmacy or store','Honestly, I don’t have one go-to']},
 {id:'missing_brand', type:'single_text', title:"Is there a brand you keep searching for on 1mg but can’t find?", options:['Yes','Can’t think of one'], textLabel:'Which brand?'},
 {id:'monthly_spend', type:'single', title:'Roughly, what leaves your wallet each month keeping your child healthy?', options:['Under ₹1,000','₹1,000 – ₹3,000','₹3,000 – ₹6,000','₹6,000 – ₹12,000','₹12,000+']},
 {id:'frustrations', type:'multi', title:"What’s the most frustrating part of actually getting your child what they need?", options:['Stuff is out of stock way too often','Not sure if products are genuine / trustworthy','It’s expensive','I don’t know what’s actually right for their age','Can’t get timely doctor advice','Delivery is slow or unreliable','No clear guidance on dosage or usage','Too many brands, impossible to compare']},
 {id:'assistant_features', type:'multi_plus_single_text', title:"If we built you a personal assistant just for your child’s health, what would you want it to actually do?", hint:'Select all that apply, then tell us whether you would pay monthly for a bundle like this.', options:['Get me a doctor on call, fast','Help me manage my own mental load as a parent','Track vaccines and remind me before I forget','Auto-order the stuff we always run out of, like formula or diapers','Track growth and flag if something seems off','Tell me what’s actually right for their age, not just what’s trending','Connect me with other parents dealing with the same thing','Guarantee everything I buy is genuine','Give me a discount for buying the essentials regularly','Teach me things I don’t already know','Something else'], followId:'pay_monthly', followTitle:'Would you actually pay monthly for a bundle of what you picked above?', followOptions:['Yes, if it’s reasonably priced','Maybe — depends on the price','No, I’d only use the free stuff'], textLabel:'What else would help?'},
 {id:'nps', type:'scale', title:'Scale of 0 to 10 — how likely are you to tell another parent to try 1mg for their kid’s health needs?'},
 {id:'advice', type:'textarea', optional:true, title:'Optional: If you could give a brand-new parent one piece of advice about their child’s health, what would it be?'}
];
function startSurvey(){ state.step=0; render(); }
function stageGroup(v){ if(v.includes('expecting')||v.includes('Newborn')||v.includes('Infant'))return 'early'; if(v.includes('Toddler')||v.includes('Preschooler'))return 'growing'; return 'school'; }
function getQ(){ return questions[state.step]; }
function progress(){ return Math.round(((state.step+1)/questions.length)*100); }
function render(){ const q=getQ(); const app=document.getElementById('app'); app.className='card'; app.innerHTML=`<div class="progress"><div class="bar" style="width:${progress()}%"></div></div><div class="qnum">Question ${state.step+1} of ${questions.length}</div><h2 class="question">${q.title}</h2>${q.hint?`<p class="hint">${q.hint}</p>`:''}<div id="body"></div><div id="err" class="error"></div><div class="nav"><button class="btn secondary" onclick="back()">Back</button><button class="btn" onclick="next()">${state.step===questions.length-1?'Submit':'Next'}</button></div>`; renderBody(q); }
function renderBody(q){ const body=document.getElementById('body'); let val=state.answers[q.id]; const opts=typeof q.options==='function'?q.options():q.options;
 if(q.type==='single'||q.type==='single_text') body.innerHTML=`<div class="options">${opts.map(o=>`<label class="opt ${val===o?'selected':''}"><input type="radio" name="${q.id}" value="${esc(o)}" ${val===o?'checked':''}> <span>${o}</span></label>`).join('')}</div>${q.type==='single_text'?`<div id="txtbox" class="${val==='Yes'?'':'hidden'}" style="margin-top:14px"><label class="tiny">${q.textLabel}</label><input class="field" id="${q.id}_text" value="${esc(state.answers[q.id+'_text']||'')}" placeholder="Type brand name here" /></div>`:''}`;
 if(q.type==='multi') body.innerHTML=`<div class="options">${opts.map(o=>`<label class="opt ${(val||[]).includes(o)?'selected':''}"><input type="checkbox" name="${q.id}" value="${esc(o)}" ${(val||[]).includes(o)?'checked':''}> <span>${o}</span></label>`).join('')}</div>`;
 if(q.type==='multi_plus_single_text') body.innerHTML=`<div class="options">${opts.map(o=>`<label class="opt ${(val||[]).includes(o)?'selected':''}"><input type="checkbox" name="${q.id}" value="${esc(o)}" ${(val||[]).includes(o)?'checked':''}> <span>${o}</span></label>`).join('')}</div><div id="otherbox" class="${(val||[]).includes('Something else')?'':'hidden'}" style="margin-top:14px"><label class="tiny">${q.textLabel}</label><input class="field" id="${q.id}_text" value="${esc(state.answers[q.id+'_text']||'')}" placeholder="Tell us what else" /></div><h3 style="margin-top:24px">${q.followTitle}</h3><div class="options">${q.followOptions.map(o=>`<label class="opt ${state.answers[q.followId]===o?'selected':''}"><input type="radio" name="${q.followId}" value="${esc(o)}" ${state.answers[q.followId]===o?'checked':''}> <span>${o}</span></label>`).join('')}</div>`;
 if(q.type==='scale') body.innerHTML=`<div class="scale">${Array.from({length:11},(_,i)=>`<button type="button" class="${val===i?'selected':''}" onclick="state.answers.${q.id}=${i}; renderBody(getQ())">${i}</button>`).join('')}</div><div style="display:flex;justify-content:space-between;margin-top:8px" class="tiny"><span>Not likely</span><span>Very likely</span></div>`;
 if(q.type==='textarea') body.innerHTML=`<textarea class="field" id="${q.id}" placeholder="Share anything that might help another parent...">${esc(val||'')}</textarea>`;
 body.querySelectorAll('input').forEach(el=>el.addEventListener('change',()=>{capture(false); renderBody(getQ());})); }
function capture(validate=true){ const q=getQ(); const err=document.getElementById('err'); if(err)err.textContent='';
 if(q.type==='single'||q.type==='single_text'){ const sel=document.querySelector(`input[name="${q.id}"]:checked`); state.answers[q.id]=sel?sel.value:''; if(q.type==='single_text'){ const t=document.getElementById(q.id+'_text'); state.answers[q.id+'_text']=t?t.value.trim():''; }}
 if(q.type==='multi'){ state.answers[q.id]=[...document.querySelectorAll(`input[name="${q.id}"]:checked`)].map(x=>x.value); }
 if(q.type==='multi_plus_single_text'){ state.answers[q.id]=[...document.querySelectorAll(`input[name="${q.id}"]:checked`)].map(x=>x.value); const fs=document.querySelector(`input[name="${q.followId}"]:checked`); state.answers[q.followId]=fs?fs.value:''; const t=document.getElementById(q.id+'_text'); state.answers[q.id+'_text']=t?t.value.trim():''; }
 if(q.type==='textarea'){ const t=document.getElementById(q.id); state.answers[q.id]=t?t.value.trim():''; }
 if(!validate||q.optional) return true;
 let ok=true; if(q.type==='single'||q.type==='single_text') ok=!!state.answers[q.id]; if(q.type==='multi'||q.type==='multi_plus_single_text') ok=(state.answers[q.id]||[]).length>0; if(q.type==='multi_plus_single_text') ok=ok&&!!state.answers[q.followId]; if(q.type==='scale') ok=state.answers[q.id]!==undefined;
 if(!ok && err) err.textContent='Please answer this question to continue.'; return ok; }
function next(){ if(!capture(true))return; if(getQ().id==='child_stage') state.q2Options=q2[stageGroup(state.answers.child_stage)]; if(getQ().id==='kept_up' && (state.answers.kept_up||[]).some(x=>x.includes('smooth sailing'))){ state.step=5; render(); return; } if(state.step<questions.length-1){state.step++; render();} else submit(); }
function back(){ if(state.step===0){ document.getElementById('app').className='card hero'; document.getElementById('app').innerHTML='<div class="icon">👶✨</div><div class="eyebrow">The Parent Pulse</div><h1 class="title">Kids & Baby Care</h1><p class="sub">No two kids, or parents, are the same. Tell us what your last year has actually looked like — takes about 2 minutes.</p><button class="btn" onclick="startSurvey()">Let’s go</button>'; return;} state.step--; render(); }
async function submit(){ const payload={submitted_at:new Date().toISOString(),...state.answers}; if(SUBMIT_URL){ try{ await fetch(SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); }catch(e){} } else { const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='parent-pulse-response.json'; a.click(); }
 document.getElementById('app').className='card done'; document.getElementById('app').innerHTML='<div class="icon">💛</div><h1>Thank you for the honesty.</h1><p class="sub">This isn’t going into a drawer — it’s shaping what we build next for kids and babies on 1mg.</p><p class="tiny">— Team Tata 1mg</p>'; }
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
</script>
</body>
</html>
